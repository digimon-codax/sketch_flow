version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: sketchflow_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sketchflow_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
